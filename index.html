<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Soal Latihan Ujian</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;
  --surface:#111318;
  --surface2:#181c24;
  --border:#1f2330;
  --border2:#2a3045;
  --text:#e2e6f0;
  --muted:#6b7694;
  --hint:#3d4460;
  --accent:#7c6dfa;
  --accent2:#a78bfa;
  --green:#34d399;
  --green2:#059669;
  --red:#f87171;
  --red2:#dc2626;
  --yellow:#fbbf24;
  --yellow2:#d97706;
  --blue:#60a5fa;
  --blue2:#2563eb;
  --pink:#f472b6;
  --font:'DM Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --display:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* noise overlay */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;z-index:0}

/* glow blobs */
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(124,109,250,0.08) 0%,transparent 55%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(52,211,153,0.06) 0%,transparent 55%);pointer-events:none;z-index:0}

/* HEADER */
.header{position:relative;z-index:10;padding:48px 24px 32px;text-align:center;border-bottom:1px solid var(--border)}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(124,109,250,0.1);border:1px solid rgba(124,109,250,0.25);color:var(--accent2);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:20px;margin-bottom:20px}
.header-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.header h1{font-family:var(--display);font-size:clamp(28px,5vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:12px}
.header h1 span{background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--muted);font-size:15px;max-width:500px;margin:0 auto 24px}
.header-meta{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.meta-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.meta-chip strong{color:var(--text)}

/* SCORE BAR */
.score-bar{position:sticky;top:0;z-index:50;background:rgba(10,12,16,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.score-left{display:flex;align-items:center;gap:16px}
.score-label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:1px}
.score-num{font-family:var(--display);font-size:22px;font-weight:800;color:var(--green)}
.score-track{width:160px;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.score-fill{height:100%;background:linear-gradient(90deg,var(--green2),var(--green));border-radius:3px;transition:width .5s ease;width:0%}
.btn-reset{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:7px 16px;border-radius:8px;font-family:var(--font);font-size:13px;cursor:pointer;transition:all .2s}
.btn-reset:hover{border-color:var(--red2);color:var(--red);background:rgba(248,113,113,0.05)}

/* TABS */
.tabs-wrap{position:relative;z-index:10;padding:24px 24px 0;max-width:1000px;margin:0 auto}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-1px;text-transform:uppercase}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-count{display:inline-block;background:var(--surface2);color:var(--hint);font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;font-family:var(--mono)}
.tab.active .tab-count{background:rgba(124,109,250,0.2);color:var(--accent2)}

/* MAIN */
.main{position:relative;z-index:10;max-width:1000px;margin:0 auto;padding:24px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.progress-text{font-size:13px;color:var(--muted)}
.progress-text strong{color:var(--text)}

/* SOAL CARD */
.soal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:0;margin-bottom:16px;overflow:hidden;transition:border-color .2s}
.soal-card:hover{border-color:var(--border2)}
.card-top{padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.card-num-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.num-badge{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--hint);background:var(--surface2);padding:3px 8px;border-radius:6px;letter-spacing:.5px}
.type-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase}
.type-pg{background:rgba(96,165,250,0.12);color:var(--blue);border:1px solid rgba(96,165,250,0.2)}
.type-code{background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.2)}
.type-esai{background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2)}
.soal-q{font-size:15px;line-height:1.7;color:var(--text);white-space:pre-wrap}

/* CODE BLOCK */
.code-block{background:#0d1117;border:1px solid var(--border2);border-radius:10px;padding:16px;font-family:var(--mono);font-size:13px;line-height:1.7;color:#c9d1d9;margin:14px 0;overflow-x:auto;position:relative}
.code-block::before{content:'CODE';position:absolute;top:10px;right:12px;font-size:10px;letter-spacing:1.5px;color:var(--hint);font-family:var(--mono)}

/* OPTIONS */
.card-body{padding:20px 24px}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:14px;line-height:1.5;transition:all .15s;background:transparent;text-align:left;width:100%;font-family:var(--font);color:var(--text)}
.opt:hover:not(:disabled){border-color:var(--border2);background:var(--surface2)}
.opt-key{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--hint);min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);border-radius:5px;margin-top:1px;transition:all .15s;flex-shrink:0}
.opt:hover:not(:disabled) .opt-key{border-color:var(--muted);color:var(--text)}
.opt.correct{background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.35);cursor:default}
.opt.correct .opt-key{background:rgba(52,211,153,0.2);border-color:var(--green);color:var(--green)}
.opt.wrong{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.35);cursor:default}
.opt.wrong .opt-key{background:rgba(248,113,113,0.2);border-color:var(--red);color:var(--red)}
.opt.reveal-correct{background:rgba(52,211,153,0.06);border-color:rgba(52,211,153,0.25);cursor:default}
.opt.reveal-correct .opt-key{color:var(--green);border-color:rgba(52,211,153,.4)}
.opt:disabled{pointer-events:none}

/* EXPLANATION */
.explanation{margin-top:14px;padding:14px 16px;background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:13px;line-height:1.6;color:var(--muted)}
.explanation strong{color:var(--text)}

/* REVEAL BTN */
.reveal-btn{margin-top:12px;font-size:13px;color:var(--hint);background:transparent;border:1px solid var(--border);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:var(--font);transition:all .2s}
.reveal-btn:hover{color:var(--muted);border-color:var(--border2);background:var(--surface2)}

/* ESAI */
.esai-area{width:100%;min-height:100px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;resize:vertical;margin-top:4px;transition:border-color .2s}
.esai-area:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(52,211,153,0.08)}
.kisi-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent2);cursor:pointer;margin-top:12px;padding:6px 12px;border-radius:8px;border:1px solid rgba(124,109,250,0.2);background:rgba(124,109,250,0.06);transition:all .2s}
.kisi-toggle:hover{background:rgba(124,109,250,0.12)}
.kisi-box{display:none;margin-top:12px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;font-size:13px;line-height:1.7;color:var(--muted)}
.kisi-box strong{color:var(--accent2)}

/* RESULT INDICATOR */
.result-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;flex-shrink:0;margin-left:auto}
.result-icon.ok{background:rgba(52,211,153,0.2);color:var(--green)}
.result-icon.fail{background:rgba(248,113,113,0.2);color:var(--red)}

/* FOOTER */
.footer{position:relative;z-index:10;text-align:center;padding:40px 24px;border-top:1px solid var(--border);margin-top:20px;color:var(--hint);font-size:13px}

@media(max-width:600px){
  .header{padding:32px 16px 24px}
  .main,.tabs-wrap{padding-left:16px;padding-right:16px}
  .card-top,.card-body{padding:16px}
  .score-track{width:100px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">✦ Bank Soal Latihan</div>
  <h1>Persiapan <span>Ujian</span></h1>
  <p>45 soal latihan — Basis Data, Pemrograman Web, Java, dan Android Studio</p>
  <div class="header-meta">
    <div class="meta-chip">📚 <strong>4 Mata Pelajaran</strong></div>
    <div class="meta-chip">📝 <strong>40 PG + Kode</strong></div>
    <div class="meta-chip">✍️ <strong>5 Esai</strong></div>
  </div>
</div>

<div class="score-bar" id="scoreBar" style="display:none">
  <div class="score-left">
    <div>
      <div class="score-label">Skor</div>
      <div class="score-num" id="scoreNum">0/40</div>
    </div>
    <div>
      <div class="score-label" style="margin-bottom:4px">Progress</div>
      <div class="score-track"><div class="score-fill" id="scoreFill"></div></div>
    </div>
  </div>
  <button class="btn-reset" onclick="resetAll()">↺ Reset Semua</button>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabBar"></div>
</div>

<div class="main">
  <div class="progress-row">
    <div class="progress-text" id="progText"></div>
  </div>
  <div id="soalList"></div>
</div>

<div class="footer">Semangat belajar! Kerjakan semua soal untuk latihan maksimal 🚀</div>

<script>
const DATA = {
  basdat:{label:'Basis Data',color:'#7c6dfa',soal:[
    {type:'pg',q:'Perintah SQL yang digunakan untuk menampilkan semua data dari tabel siswa adalah...',opts:['SELECT siswa FROM *','SELECT * FROM siswa','SHOW * FROM siswa','GET ALL siswa'],ans:1,ex:'SELECT * FROM namatabel adalah sintaks standar untuk menampilkan semua kolom dari sebuah tabel.'},
    {type:'pg',q:'Primary Key berfungsi untuk...',opts:['Menghubungkan dua database','Mengidentifikasi setiap baris data secara unik','Menyimpan password user','Mengurutkan data secara otomatis'],ans:1,ex:'Primary Key menjamin setiap baris memiliki nilai unik sehingga bisa diidentifikasi satu per satu.'},
    {type:'code',q:'Query berikut ini berfungsi untuk apa?\n\nUPDATE siswa SET kelas="XII RPL" WHERE nis="001";',opts:['Menghapus siswa dengan nis 001','Menambah siswa baru','Mengubah kolom kelas menjadi XII RPL untuk siswa ber-NIS 001','Menampilkan siswa kelas XII RPL'],ans:2,ex:'UPDATE ... SET ... WHERE digunakan untuk memperbarui nilai kolom tertentu pada baris yang memenuhi kondisi WHERE.'},
    {type:'code',q:'Apa output/hasil dari query berikut ini?\n\nSELECT nama, nis FROM siswa ORDER BY nis DESC LIMIT 2;\n\nJika tabel siswa berisi:\nid=1, nama=Andi, nis=1001\nid=2, nama=Budi, nis=1003\nid=3, nama=Citra, nis=1002',opts:['Andi 1001, Budi 1003','Budi 1003, Citra 1002','Citra 1002, Andi 1001','Budi 1003, Andi 1001'],ans:1,ex:'ORDER BY nis DESC mengurutkan dari NIS terbesar (1003, 1002, 1001). LIMIT 2 hanya ambil 2 baris teratas, yaitu Budi(1003) dan Citra(1002).'},
    {type:'pg',q:'Jenis JOIN yang hanya menampilkan data yang memiliki kecocokan di kedua tabel adalah...',opts:['LEFT JOIN','RIGHT JOIN','INNER JOIN','FULL JOIN'],ans:2,ex:'INNER JOIN hanya mengembalikan baris yang ada pasangannya di kedua tabel. Baris yang tidak cocok akan diabaikan.'},
    {type:'code',q:'Temukan kesalahan pada query berikut dan tuliskan perbaikannya:\n\nSELECT * FROM siswa WHERE nama = Budi;',opts:['Tidak ada kesalahan','Seharusnya: WHERE nama == "Budi"','Seharusnya: WHERE nama = \'Budi\'','Seharusnya: WHERE nama LIKE Budi'],ans:2,ex:'Nilai string dalam SQL harus diapit tanda kutip. Tanpa kutip, parser menganggap Budi sebagai nama kolom yang tidak ada.'},
    {type:'pg',q:'Foreign Key digunakan untuk...',opts:['Membuat index pencarian','Menjaga integritas referensial antar tabel','Mengenkripsi data sensitif','Membatasi jumlah baris'],ans:1,ex:'Foreign Key memastikan nilai di kolom child table selalu merujuk ke nilai yang ada di parent table, menjaga konsistensi hubungan antar tabel.'},
    {type:'pg',q:'Perintah untuk memberikan semua hak akses user "admin" ke database "sekolah" adalah...',opts:['GIVE ALL TO admin ON sekolah.*','GRANT ALL PRIVILEGES ON sekolah.* TO \'admin\'@\'localhost\'','SET PRIVILEGES admin = ALL ON sekolah','ALLOW admin ALL ON sekolah'],ans:1,ex:'Sintaks GRANT diikuti privilege, nama database, lalu TO username@host.'},
    {type:'code',q:'Apakah query di bawah ini dapat dijalankan tanpa error?\n\nCREATE TABLE mahasiswa (\n  nim INT(10),\n  nama VARCHAR(50),\n  nim INT(5)\n);',opts:['Bisa dijalankan, duplikat diabaikan','Tidak bisa, ada duplikat nama kolom nim','Bisa, tapi nim terakhir yang dipakai','Tergantung versi MySQL'],ans:1,ex:'MySQL tidak mengizinkan dua kolom dengan nama yang sama dalam satu tabel. Query ini akan menghasilkan error "Duplicate column name nim".'},
    {type:'pg',q:'LEFT JOIN mengembalikan...',opts:['Hanya data yang cocok di kedua tabel','Semua data tabel kiri, data tabel kanan NULL jika tidak cocok','Semua data tabel kanan, data tabel kiri NULL jika tidak cocok','Gabungan semua data dari kedua tabel'],ans:1,ex:'LEFT JOIN mempertahankan semua baris dari tabel kiri, dan mengisi NULL untuk kolom tabel kanan jika tidak ada pasangannya.'},
  ]},
  web:{label:'Pemrog. Web',color:'#34d399',soal:[
    {type:'pg',q:'Tag HTML yang digunakan untuk membuat formulir input adalah...',opts:['<input>','<form>','<field>','<submit>'],ans:1,ex:'<form> adalah elemen wadah untuk semua kontrol input. Tanpa <form>, data tidak bisa dikirim ke server secara terstruktur.'},
    {type:'code',q:'Apa yang ditampilkan di browser dari kode HTML berikut?\n\n<p style="color:red; font-size:20px;">Halo Dunia</p>',opts:['Teks "Halo Dunia" berwarna merah ukuran 20px','Teks "Halo Dunia" default, style diabaikan','Error karena style di dalam tag p','Teks merah tanpa ukuran tertentu'],ans:0,ex:'Inline style berlaku langsung pada elemen tersebut. color:red membuat teks merah dan font-size:20px mengatur ukurannya.'},
    {type:'pg',q:'Pada PHP, fungsi yang digunakan untuk menghubungkan ke database MySQL adalah...',opts:['mysql_open()','mysqli_connect()','db_connect()','pdo_open()'],ans:1,ex:'mysqli_connect(host, user, password, database) adalah fungsi PHP prosedural untuk membuka koneksi ke MySQL.'},
    {type:'code',q:'Temukan bug pada kode PHP berikut:\n\n<?php\n$nama = "Budi";\necho "Halo " . nama . "!";\n?>',opts:['Tidak ada bug','echo tidak bisa pakai titik','Variable harus ditulis $nama, bukan nama','Tanda kutip harus tunggal'],ans:2,ex:'Di PHP semua variabel diawali tanda dollar ($). "nama" tanpa $ akan dianggap konstanta yang tidak terdefinisi.'},
    {type:'pg',q:'Method form yang digunakan untuk mengirim data sensitif (seperti password) adalah...',opts:['GET','POST','SEND','PUT'],ans:1,ex:'Method POST mengirim data di body request, tidak terlihat di URL. GET menambahkan data ke URL sehingga tidak aman untuk password.'},
    {type:'code',q:'Apakah kode CSS berikut valid dan bekerja dengan benar?\n\n.tombol {\n  background-color: blue\n  color: white;\n  padding: 10px;\n}',opts:['Valid dan bekerja normal','Tidak valid, ada titik koma yang hilang setelah "blue"','Tidak valid, property background-color salah','Valid, tapi warna tidak diterapkan'],ans:1,ex:'Setiap deklarasi CSS harus diakhiri titik koma (;). "background-color: blue" tanpa titik koma menyebabkan parser gagal memproses kedua properti.'},
    {type:'pg',q:'Fungsi PHP untuk mencegah serangan XSS saat menampilkan data dari database adalah...',opts:['strip_tags()','htmlspecialchars()','addslashes()','sanitize()'],ans:1,ex:'htmlspecialchars() mengubah karakter seperti < > & " menjadi HTML entity sehingga browser tidak mengeksekusinya sebagai kode.'},
    {type:'code',q:'Berapa nilai $hasil dari kode PHP berikut?\n\n<?php\n$a = "5";\n$b = 3;\n$hasil = $a + $b;\necho $hasil;\n?>',opts:['Error karena tipe berbeda','53 (string concatenation)','8','5b'],ans:2,ex:'PHP melakukan type juggling otomatis. String "5" di-cast ke integer 5 saat dioperasikan dengan +. Hasilnya 5+3=8.'},
    {type:'pg',q:'Pada CRUD, operasi "R" (Read) di SQL menggunakan perintah...',opts:['UPDATE','INSERT','SELECT','DELETE'],ans:2,ex:'CRUD = Create(INSERT), Read(SELECT), Update(UPDATE), Delete(DELETE). SELECT digunakan untuk membaca/menampilkan data.'},
    {type:'code',q:'Kode PHP berikut bisa dijalankan? Jika tidak, apa masalahnya?\n\n<?php\nsession_stat();\n$_SESSION[\'user\'] = "admin";\necho $_SESSION[\'user\'];\n?>',opts:['Bisa dijalankan, output: admin','Tidak bisa, fungsinya session_start() bukan session_stat()','Tidak bisa, $_SESSION tidak bisa di-echo','Bisa, tapi session tidak tersimpan'],ans:1,ex:'Fungsi yang benar adalah session_start(), bukan session_stat(). session_stat() bukan fungsi untuk memulai sesi.'},
  ]},
  java:{label:'Java',color:'#f472b6',soal:[
    {type:'pg',q:'Konsep OOP yang memungkinkan sebuah class mewarisi properti dan method dari class lain disebut...',opts:['Encapsulation','Polymorphism','Inheritance','Abstraction'],ans:2,ex:'Inheritance memungkinkan class anak (subclass) mendapatkan atribut dan method dari class induk (superclass) menggunakan keyword extends.'},
    {type:'code',q:'Apa output dari kode Java berikut?\n\npublic class Main {\n  public static void main(String[] args) {\n    int x = 10;\n    int y = 3;\n    System.out.println(x % y);\n  }\n}',opts:['3','3.33','1','0'],ans:2,ex:'Operator % adalah modulus (sisa bagi). 10 dibagi 3 = 3 sisa 1. Jadi outputnya adalah 1.'},
    {type:'pg',q:'Pada Java Swing, komponen yang digunakan untuk membuat jendela utama aplikasi adalah...',opts:['JPanel','JFrame','JWindow','JDialog'],ans:1,ex:'JFrame adalah top-level container di Swing yang menyediakan jendela dengan title bar, border, dan tombol minimize/maximize/close.'},
    {type:'code',q:'Temukan kesalahan pada kode Java berikut:\n\npublic class Halo {\n  public static void main(String[] args) {\n    System.out.println("Halo Dunia")\n  }\n}',opts:['Tidak ada kesalahan','Harus pakai printf bukan println','Tanda titik koma (;) setelah println hilang','Class harus bernama Main'],ans:2,ex:'Di Java, setiap statement harus diakhiri tanda titik koma (;). Tanpa semicolon akan menyebabkan compile error.'},
    {type:'pg',q:'Keyword yang digunakan di Java untuk membuat object dari sebuah class adalah...',opts:['create','make','new','build'],ans:2,ex:'Keyword new digunakan untuk mengalokasikan memori dan membuat instance (object) baru dari suatu class.'},
    {type:'code',q:'Apakah kode Java berikut bisa dikompilasi dan dijalankan?\n\npublic class Hitung {\n  public static void main(String[] args) {\n    int angka = 5.5;\n    System.out.println(angka);\n  }\n}',opts:['Bisa, output: 5.5','Bisa, output: 5','Tidak bisa, 5.5 adalah double, tidak bisa disimpan ke int tanpa casting','Bisa, tapi ada warning'],ans:2,ex:'Java adalah strongly typed language. 5.5 adalah literal double, tidak bisa langsung disimpan ke int. Butuh casting: int angka = (int) 5.5;'},
    {type:'pg',q:'Pada JFrame Swing, method yang digunakan agar jendela terlihat adalah...',opts:['show()','display()','setVisible(true)','open()'],ans:2,ex:'setVisible(true) membuat JFrame ditampilkan di layar. Tanpa pemanggilan method ini, window dibuat tapi tidak terlihat.'},
    {type:'code',q:'Apa output dari kode Java berikut?\n\nfor(int i = 1; i <= 5; i += 2) {\n  System.out.print(i + " ");\n}',opts:['1 2 3 4 5','1 3 5','2 4','1 3 5 7'],ans:1,ex:'Loop dimulai i=1, increment i+=2. Urutan: i=1 (cetak), i=3 (cetak), i=5 (cetak), i=7 (kondisi gagal, berhenti). Output: 1 3 5'},
    {type:'pg',q:'Tipe data yang digunakan untuk menyimpan teks (kalimat/kata) di Java adalah...',opts:['char','Text','String','varchar'],ans:2,ex:'String di Java adalah class (bukan primitive type) yang digunakan untuk menyimpan urutan karakter. Ditulis dengan huruf kapital S.'},
    {type:'code',q:'Apa yang terjadi jika kode Java berikut dijalankan?\n\nint[] arr = new int[3];\nSystem.out.println(arr[3]);',opts:['Output: 0','Output: null','ArrayIndexOutOfBoundsException','NullPointerException'],ans:2,ex:'Array new int[3] memiliki indeks 0, 1, 2. Mengakses arr[3] berarti indeks ke-4 yang tidak ada → ArrayIndexOutOfBoundsException.'},
  ]},
  android:{label:'Android',color:'#60a5fa',soal:[
    {type:'pg',q:'File yang digunakan untuk mendefinisikan tampilan (UI) suatu Activity di Android Studio adalah...',opts:['MainActivity.java','styles.xml','activity_main.xml','layout.java'],ans:2,ex:'File XML di folder res/layout/ mendefinisikan struktur tampilan. activity_main.xml adalah layout default untuk MainActivity.'},
    {type:'pg',q:'Komponen Android yang digunakan untuk menampilkan teks di layar adalah...',opts:['EditText','Button','TextView','TextInput'],ans:2,ex:'TextView digunakan untuk menampilkan teks yang tidak bisa diedit user. EditText digunakan ketika user perlu mengetik input.'},
    {type:'code',q:'Apa yang dilakukan kode Java Android berikut?\n\nTextView tv = findViewById(R.id.tvNama);\ntv.setText("Halo Android");',opts:['Membuat TextView baru dengan id tvNama','Menghapus teks pada TextView','Mencari TextView dengan id tvNama lalu mengubah teksnya menjadi "Halo Android"','Mengubah warna teks'],ans:2,ex:'findViewById(R.id.xxx) mencari komponen UI berdasarkan ID dari layout XML. setText() mengubah konten teks yang ditampilkan.'},
    {type:'pg',q:'File AndroidManifest.xml di project Android Studio berfungsi untuk...',opts:['Menyimpan data aplikasi','Mendefinisikan Activity, permission, dan konfigurasi aplikasi','Menulis logika bisnis aplikasi','Membuat tampilan UI'],ans:1,ex:'AndroidManifest.xml adalah file konfigurasi utama aplikasi Android. Berisi deklarasi semua Activity, permission, launcher icon, dan metadata.'},
    {type:'code',q:'Kode Android XML berikut benar atau ada yang perlu diperbaiki?\n\n<Button\n  android:id="@+id/btnKirim"\n  android:layout_width="wrap_content"\n  android:layout_height="wrap_content"\n  android:Text="Kirim" />',opts:['Benar, tidak ada masalah','Salah, atribut text seharusnya android:text (huruf kecil)','Salah, Button tidak punya atribut id','Benar, tapi perlu android:onClick'],ans:1,ex:'Nama atribut XML bersifat case-sensitive. "android:Text" (T besar) tidak valid. Yang benar adalah android:text (semua huruf kecil).'},
    {type:'pg',q:'Untuk menampilkan pesan singkat (pop-up sementara) kepada pengguna di Android, digunakan...',opts:['AlertDialog','Notification','Toast','SnackBar'],ans:2,ex:'Toast.makeText(context, "pesan", Toast.LENGTH_SHORT).show(); menampilkan pesan singkat yang muncul sebentar lalu hilang otomatis.'},
    {type:'code',q:'Apa fungsi kode berikut di Activity Android?\n\n@Override\nprotected void onCreate(Bundle savedInstanceState) {\n  super.onCreate(savedInstanceState);\n  setContentView(R.layout.activity_main);\n}',opts:['Mengakhiri Activity','Menghubungkan Activity ke layout activity_main.xml dan menginisialisasi komponen','Menyimpan state aplikasi','Menjalankan animasi'],ans:1,ex:'onCreate() adalah method lifecycle pertama saat Activity dibuat. setContentView() menghubungkan Activity dengan file layout XML-nya.'},
    {type:'pg',q:'Jenis layout Android yang menempatkan komponen secara vertikal atau horizontal satu per satu adalah...',opts:['RelativeLayout','ConstraintLayout','LinearLayout','FrameLayout'],ans:2,ex:'LinearLayout menempatkan child view secara berurutan dengan android:orientation="vertical" atau "horizontal".'},
    {type:'code',q:'Apakah kode Java Android berikut bisa berjalan?\n\nButton btn = findViewById(R.id.btnTest);\nbtn.setOnClickListener(new View.OnClickListener() {\n  public void onClick(View v) {\n    Toast.makeText(this, "Klik!", Toast.LENGTH_SHORT).show();\n  }\n});',opts:['Bisa, menampilkan Toast "Klik!"','Tidak bisa, "this" di dalam anonymous class merujuk ke OnClickListener bukan Activity','Tidak bisa, sintaks setOnClickListener salah','Bisa, tapi Toast tidak muncul'],ans:1,ex:'Di dalam anonymous inner class, "this" merujuk ke instance OnClickListener bukan Activity. Gunakan NamaActivity.this untuk referensi Activity.'},
    {type:'pg',q:'Atribut XML yang mengatur lebar komponen agar menyesuaikan kontennya di Android adalah...',opts:['android:layout_width="fill_parent"','android:layout_width="wrap_content"','android:layout_width="match_parent"','android:width="auto"'],ans:1,ex:'"wrap_content" membuat komponen hanya selebar kontennya. "match_parent" membuat komponen selebar parent-nya.'},
  ]},
  esai:{label:'Esai',color:'#fbbf24',soal:[
    {type:'esai',q:'Jelaskan perbedaan antara PRIMARY KEY dan FOREIGN KEY dalam basis data relasional. Berikan masing-masing satu contoh penggunaannya dalam konteks sistem sekolah.',kisi:'Jawaban mencakup: Primary Key = identifier unik tiap baris di tabel sendiri (contoh: id/nim di tabel siswa). Foreign Key = kolom yang merujuk Primary Key tabel lain untuk menjaga integritas referensial (contoh: id_kelas di tabel siswa merujuk ke id di tabel kelas). Skor lebih tinggi jika menyebutkan bahwa FK mencegah data orphan.'},
    {type:'esai',q:'Jelaskan perbedaan antara method GET dan POST pada HTML form. Dalam kondisi apa sebaiknya masing-masing digunakan?',kisi:'Jawaban mencakup: GET = data dikirim via URL (query string), terlihat, bisa di-bookmark, cocok untuk pencarian/filter. POST = data dikirim di body request, tidak terlihat di URL, lebih aman untuk data sensitif (login, password). GET memiliki batas panjang URL, POST tidak.'},
    {type:'esai',q:'Apa yang dimaksud dengan konsep OOP (Object-Oriented Programming)? Sebutkan dan jelaskan 4 pilar utamanya.',kisi:'4 pilar: (1) Encapsulation: menyembunyikan data internal, akses via getter/setter. (2) Inheritance: class anak mewarisi properti/method class induk. (3) Polymorphism: satu method bisa berperilaku berbeda tergantung objek. (4) Abstraction: menyembunyikan detail implementasi, hanya tampilkan fungsionalitas.'},
    {type:'esai',q:'Jelaskan siklus hidup (lifecycle) Activity di Android Studio. Sebutkan minimal 4 method lifecycle dan kapan masing-masing dipanggil.',kisi:'Method lifecycle: onCreate() - saat Activity pertama dibuat. onStart() - Activity mulai terlihat. onResume() - Activity aktif di foreground. onPause() - Activity kehilangan fokus tapi masih terlihat. onStop() - Activity tidak terlihat. onDestroy() - Activity dihancurkan. Nilai lebih jika bisa menggambarkan alur lengkapnya.'},
    {type:'esai',q:'Dalam pengembangan web dengan PHP, apa yang dimaksud dengan SQL Injection? Bagaimana cara mencegahnya? Berikan contoh nyata.',kisi:'SQL Injection = serangan dengan menyisipkan kode SQL berbahaya melalui input user. Contoh: memasukkan OR 1=1 di form login. Pencegahan: (1) Prepared Statement/mysqli_prepare() dengan bind_param, (2) htmlspecialchars() untuk output, (3) validasi input di sisi server, (4) tidak langsung memasukkan $_POST/$_GET ke query SQL.'},
  ]}
};

const KEYS=['A','B','C','D'];
const state={tab:'basdat',answers:{},revealed:{}};

function getOffset(tab){
  const order=['basdat','web','java','android'];
  const idx=order.indexOf(tab);
  return idx>=0?idx*10:0;
}

function buildTabs(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML='';
  Object.entries(DATA).forEach(([k,v])=>{
    const b=document.createElement('button');
    b.className='tab'+(state.tab===k?' active':'');
    const count=k==='esai'?'5':'10';
    b.innerHTML=`${v.label}<span class="tab-count">${count}</span>`;
    b.onclick=()=>{state.tab=k;buildTabs();render();};
    bar.appendChild(b);
  });
}

function render(){
  const {soal}=DATA[state.tab];
  const isEsai=state.tab==='esai';
  const offset=isEsai?40:getOffset(state.tab);

  if(!isEsai){
    const answered=soal.filter((_,i)=>state.answers[offset+i]!==undefined).length;
    document.getElementById('progText').innerHTML=`<strong>${answered}/${soal.length}</strong> soal dijawab di bagian ini`;
  } else {
    document.getElementById('progText').innerHTML=`<strong>5 soal esai</strong> — tulis jawaban dan lihat kisi-kisi`;
  }

  const container=document.getElementById('soalList');
  container.innerHTML='';

  soal.forEach((s,i)=>{
    const gi=offset+i;
    const card=document.createElement('div');
    card.className='soal-card';

    const typeLabel={pg:'Pilihan Ganda',code:'Analisis Kode',esai:'Esai'}[s.type];
    const typeCls={pg:'type-pg',code:'type-code',esai:'type-esai'}[s.type];

    // Format question: detect code lines
    let qHtml='';
    const parts=s.q.split('\n\n');
    parts.forEach((part,pi)=>{
      const lines=part.split('\n');
      const isCode=lines.length>1&&(part.includes(';')||part.includes('{')||part.includes('SELECT')||part.includes('<?')||part.includes('public')||part.includes('android'));
      if(pi===0){
        qHtml+=`<div class="soal-q">${escHtml(part)}</div>`;
      } else if(isCode){
        qHtml+=`<div class="code-block">${escHtml(part)}</div>`;
      } else {
        qHtml+=`<div class="soal-q" style="margin-top:10px;font-size:13px;color:var(--muted)">${escHtml(part)}</div>`;
      }
    });

    let bodyHtml='';
    const answered=state.answers[gi];
    const isRevealed=state.revealed[gi];

    if(s.type==='esai'){
      bodyHtml=`<textarea class="esai-area" placeholder="Tulis jawaban esai kamu di sini..." id="esai_${gi}"></textarea>
      <div class="kisi-toggle" onclick="toggleKisi(${gi})">▸ Lihat kisi-kisi jawaban</div>
      <div class="kisi-box" id="kisi_${gi}"><strong>Kisi-kisi:</strong><br>${escHtml(s.kisi)}</div>`;
    } else {
      let optsHtml='<div class="opts">';
      s.opts.forEach((o,j)=>{
        let cls='opt';
        let resultIcon='';
        if(answered!==undefined){
          if(j===s.ans){cls+=' correct';if(j===answered)resultIcon='<span class="result-icon ok">✓</span>';}
          else if(j===answered&&j!==s.ans){cls+=' wrong';resultIcon='<span class="result-icon fail">✗</span>';}
        } else if(isRevealed&&j===s.ans){
          cls+=' reveal-correct';
        }
        const dis=(answered!==undefined||isRevealed)?'disabled':'';
        optsHtml+=`<button class="${cls}" ${dis} onclick="doAnswer(${gi},${j})">`
          +`<span class="opt-key">${KEYS[j]}</span><span>${escHtml(o)}</span>${resultIcon}</button>`;
      });
      optsHtml+='</div>';

      let feedbackHtml='';
      if(answered!==undefined||isRevealed){
        feedbackHtml=`<div class="explanation">${escHtml(s.ex)}</div>`;
      } else {
        feedbackHtml=`<button class="reveal-btn" onclick="doReveal(${gi})">Lihat jawaban benar</button>`;
      }
      bodyHtml=optsHtml+feedbackHtml;
    }

    card.innerHTML=`
      <div class="card-top">
        <div class="card-num-row">
          <span class="num-badge">SOAL ${gi+1}</span>
          <span class="type-badge ${typeCls}">${typeLabel}</span>
        </div>
        ${qHtml}
      </div>
      <div class="card-body">${bodyHtml}</div>`;
    container.appendChild(card);
  });

  updateScore();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function doAnswer(gi,chosen){
  state.answers[gi]=chosen;
  document.getElementById('scoreBar').style.display='flex';
  render();
}
function doReveal(gi){
  state.revealed[gi]=true;
  render();
}
function toggleKisi(gi){
  const el=document.getElementById('kisi_'+gi);
  const tog=el.previousElementSibling;
  if(el.style.display==='block'){
    el.style.display='none';tog.textContent='▸ Lihat kisi-kisi jawaban';
  } else {
    el.style.display='block';tog.textContent='▾ Sembunyikan kisi-kisi';
  }
}
function updateScore(){
  let correct=0,total=0;
  ['basdat','web','java','android'].forEach((t,ti)=>{
    DATA[t].soal.forEach((s,i)=>{
      const gi=ti*10+i;total++;
      if(state.answers[gi]===s.ans)correct++;
    });
  });
  const anyAns=Object.keys(state.answers).length>0;
  document.getElementById('scoreBar').style.display=anyAns?'flex':'none';
  document.getElementById('scoreNum').textContent=`${correct}/40`;
  document.getElementById('scoreFill').style.width=`${Math.round(correct/40*100)}%`;
}
function resetAll(){
  if(!confirm('Reset semua jawaban?'))return;
  state.answers={};state.revealed={};
  document.getElementById('scoreBar').style.display='none';
  render();
}

buildTabs();render();
</script>
</body>
